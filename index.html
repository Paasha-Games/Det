<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لێکۆڵەر: دۆزینەوەی بکوژەکە</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --blood-dark: #6e0101;
            --blood-base: #b20710;
            --blood-light: #ff0000;
            --dark-deep: #000000;
            --dark-card: #0c0c0c;
            --dark-border: #1a1a1a;
            --gold: #d4af37;
            --gold-light: #f1dfa1;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
        }

        /* --- GLOBAL RESET & TYPOGRAPHY --- */
        * { box-sizing: border-box; font-family: 'Noto Sans Arabic', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--dark-deep); color: var(--text-main); margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; }

        /* --- HERO SCREEN (LANDING) --- */
        #hero-screen {
            height: 100vh; width: 100vw;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)), 
                        url('https://images.unsplash.com/photo-1510133769168-2f76a135a589?auto=format&fit=crop&q=60');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            position: absolute; top: 0; left: 0; z-index: 1000;
            transition: transform 0.8s ease-in-out;
        }
        #hero-screen.hidden { transform: translateY(-100vh); }
        .hero-title { font-size: 5rem; color: var(--blood-base); margin: 0; text-shadow: 0 0 20px rgba(178, 7, 16, 0.6); }
        .hero-subtitle { font-size: 1.4rem; color: var(--gold); margin-top: 15px; margin-bottom: 40px; letter-spacing: 1px; max-width: 600px; }

        /* --- RED DECORATIVE LINE (Fixing your issue) --- */
        .red-line-fix {
            height: 10px; width: 100vw;
            background: linear-gradient(90deg, transparent 0%, var(--blood-base) 50%, transparent 100%);
            box-shadow: 0 0 20px var(--blood-base);
            position: fixed; top: 0; left: 0; z-index: 999;
        }

        /* --- MAIN GAME SECTION --- */
        #main-game {
            display: grid; grid-template-rows: auto 1fr auto;
            height: 100vh; width: 100vw;
            padding-top: 20px; /* Offset for the red line fix */
            visibility: hidden; position: absolute; top: 0; left: 0; z-index: 100;
        }
        #main-game.visible { visibility: visible; }

        /* Game UI Panels */
        .game-panel { display: none; overflow-y: auto; height: 100%; width: 100%; max-width: 900px; margin: 0 auto; padding: 30px; }
        .game-panel.active { display: block; animation: panelIn 0.5s ease-out; }

        /* Top Header (Stats) */
        .game-header { background: #080808; padding: 15px 30px; border-bottom: 1px solid var(--dark-border); display: flex; justify-content: space-between; align-items: center; color: var(--gold); }
        .stat-item { font-size: 1.1rem; }
        .stat-label { color: var(--text-dim); margin-left: 8px; }

        /* Main Content Container */
        .case-title { color: var(--blood-base); font-size: 2.2rem; font-weight: 700; margin-bottom: 20px; }
        .case-story { font-size: 1.1rem; line-height: 1.8; color: var(--text-main); margin-bottom: 40px; }

        /* Suspect Grid */
        .suspect-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }
        
        .suspect-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .suspect-card:hover { border-color: var(--gold); background: #1a1a1a; transform: translateX(-5px); }
        .suspect-card::after { content: ''; position: absolute; right: -4px; top: 50%; transform: translateY(-50%); width: 4px; height: 0%; background: var(--blood-base); transition: 0.3s ease; }
        .suspect-card:hover::after { height: 80%; }
        
        .suspect-name { font-size: 1.3rem; font-weight: 700; color: var(--gold-light); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .suspect-alibi { font-size: 1.05rem; line-height: 1.7; color: var(--text-main); }
        
        /* Select Button Overlay */
        .suspect-select { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.8); color: white; padding: 8px 15px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; opacity: 0; transition: 0.3s; pointer-events: none; }
        .suspect-card:hover .suspect-select { opacity: 1; }

        /* --- FOOTER --- */
        footer { background: #050505; border-top: 1px solid var(--dark-border); padding: 20px; text-align: center; color: #444; font-size: 0.8rem; }

        /* --- UTILITY & ANIMATIONS --- */
        .btn { border: none; padding: 18px 50px; font-size: 1.25rem; font-weight: 700; cursor: pointer; border-radius: 6px; transition: 0.3s; text-decoration: none; display: inline-block; }
        .btn-main { background: var(--blood-base); color: white; box-shadow: 0 4px 15px rgba(178, 7, 16, 0.4); }
        .btn-main:hover { background: var(--blood-light); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(178, 7, 16, 0.6); }

        /* Correct/Incorrect Overlay Screen */
        #overlay-result { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 50px; z-index: 2000; visibility: hidden; opacity: 0; transition: 0.5s ease; }
        #overlay-result.visible { visibility: visible; opacity: 1; }
        
        .result-icon { font-size: 6rem; margin-bottom: 20px; }
        .result-title { font-size: 3rem; font-weight: 700; margin-bottom: 15px; }
        .result-text { font-size: 1.2rem; line-height: 1.8; color: var(--text-dim); max-width: 700px; text-align: center; margin-bottom: 40px; }

        /* Score Tracker Style */
        #final-score-panel { text-align: center; padding: 100px 20px; }
        #final-score-num { font-size: 8rem; color: var(--gold); font-weight: 700; }
        #final-score-label { font-size: 1.5rem; color: var(--text-dim); margin-bottom: 50px; }

        @keyframes panelIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes correct { 0% { color: white; } 50% { color: limegreen; } 100% { color: white; } }
        @keyframes incorrect { 0% { color: white; } 50% { color: var(--blood-base); } 100% { color: white; } }

    </style>
</head>
<body>

    <div id="hero-screen">
        <h1 class="hero-title">لێکۆڵەر</h1>
        <p class="hero-subtitle">لەگەڵ تاریکییەکەت ڕووبەڕوو ببنەوە. هەموو بکوژێک سەرەداوێکی لەدوای خۆی جێهێشتووە. تەنها لێهاتووترین لێکۆڵەر دەتوانێت ڕاستییەکان بدۆزێتەوە.</p>
        <button class="btn btn-main" onclick="startTheInvestigation()">دەستپێکردنی لێکۆڵینەوە</button>
    </div>

    <div id="main-game">
        
        <div class="red-line-fix"></div>

        <div class="game-header">
            <div class="stat-item"><span class="stat-label">نمرەی ئێستا:</span> <span id="game-score">0</span></div>
            <div class="stat-item"><span class="stat-label">دۆسیە:</span> <span id="game-case-count">1</span></div>
        </div>

        <div id="panel-investigate" class="game-panel active">
            </div>

        <div id="panel-final" class="game-panel">
            <div id="final-score-panel">
                <div id="final-score-label">نمرەی کۆتاییت</div>
                <div id="final-score-num">0</div>
                <button class="btn btn-main" onclick="resetGame()">دووبارە هەوڵبدەرەوە</button>
            </div>
        </div>

        <footer>
            <p>© 2026 پاشا گەیمز | نهێنییەکان لای ئێمە پارێزراون</p>
        </footer>

    </div>

    <div id="overlay-result">
        <div class="result-icon" id="res-icon"></div>
        <div class="result-title" id="res-title"></div>
        <p class="result-text" id="res-text"></p>
        <button class="btn btn-main" id="res-next-btn">بەردەوام بوون</button>
    </div>

    <script>
        /* --- AUDIO ENGINE (Professional Dynamic Sound Generation) --- */
        const audio = {
            mainTheme: null,
            ctx: new (window.AudioContext || window.webkitAudioContext)(),

            initMainTheme: function() {
                this.mainTheme = this.ctx.createOscillator();
                let gainNode = this.ctx.createGain();
                this.mainTheme.type = 'sawtooth';
                this.mainTheme.frequency.setValueAtTime(45, this.ctx.currentTime); // Low dark tone
                gainNode.gain.setValueAtTime(0.015, this.ctx.currentTime); // Very quiet background
                this.mainTheme.connect(gainNode); gainNode.connect(this.ctx.destination);
                this.mainTheme.start();
            },
            playClick: function() { this.playSimpleTone(440, 0.05); },
            playWin: function() {
                this.playSimpleTone(660, 0.1, 0.01);
                setTimeout(() => this.playSimpleTone(1100, 0.2, 0.01), 100);
            },
            playLose: function() {
                this.playSimpleTone(150, 0.2, 0.02);
                setTimeout(() => this.playSimpleTone(80, 0.3, 0.02), 200);
            },
            playSimpleTone: function(freq, duration, decay = 0.0) {
                let osc = this.ctx.createOscillator();
                let gainNode = this.ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gainNode.gain.setValueAtTime(0.04, this.ctx.currentTime);
                if (decay) gainNode.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration + decay);
                osc.connect(gainNode); gainNode.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            }
        };

        /* --- GAME ENGINE & LOGIC --- */
        let score = 0;
        let activeCaseIndex = 0;
        let isGameOver = false;

        // 10 UNIQUE CASES
        const casesDatabase = [
            { id: 1, title: "مەتەڵی ژووری داخراو", story: "بازرگانێک لە ژوورێکی داخراودا بە مردوویی دۆزرایەوە. پۆلیس هیچ ڕێگایەکی نەدۆزیەوە بکوژەکە چووبێتە ژوورەوە. تەنها سێ کەس لە خانووەکە بوون:", suspects: [ { name: "خزمەتکارەکە", alibi: "من لە چێشتخانە سەرقاڵی چێشتلێنان بووم.", isKiller: false }, { name: "کوڕی بازرگانەکە", alibi: "من لە ژووری نانخواردن سەیری تەلەفزیۆنم دەکرد.", isKiller: false }, { name: "چاککەرەوەی مۆبیلیات", alibi: "من لە پشت خانووەکە مۆبیلیاتم بۆ چاک دەکرد.", isKiller: true } ], explanation: "چاککەرەوەی مۆبیلیاتەکە! چونکە دەرگای ژوورەکە بە کلیل داخرابوو، تەنها کەسێک کە کلیلەکەی لەلای بووبێت یان کلیلی کاتی دروست کردبێت بکوژەکەیە. ئەو پێشتر ڕێگای دۆزیوەتەوە کلیلەکان لەبەر بگرێتەوە." },
            { id: 2, title: "تاوانی مۆزەخانە", story: "تاجێکی شاهانە دزراوە. پاسەوانەکە دەڵێت کاتژمێر ٢ی شەو دزەکە چووەتە ژوورەوە و بەهۆی تاریکییەوە تەنها چاکەتێکی سووری بینیوە. ئەم سێ کەسە لە گۆمان لێکراوەکانن:", suspects: [ { name: "کارمەندی مۆزەخانە", alibi: "من لە خەودا بووم لە ماڵەوە.", isKiller: false }, { name: "پاسەوانەکە", alibi: "من هەوڵمدا بیدۆزمەوە بەڵام تاریکی زۆر بوو.", isKiller: true }, { name: "گەشتیارەکە", alibi: "من تەنها بۆ گەشت هاتبووم و ناسنامەم ون کردبوو.", isKiller: false } ], explanation: "پاسەوانەکە بکوژەکەیە! چونکە تاریکی ڕەها لە مۆزەخانەکەدا وای کردووە کەس نەتوانێت ڕەنگی سوور بە ڕوونی ببینێت. تەنها پاسەوانەکە دەیتوانی کە دڵنیابێت لەوەی کە دزەکە چاکەتێکی سووری لەبەردا بووە." },
            { id: 3, title: "تاوانی نووسینگە", story: "خاوەنکارێک لە نووسینگەکەی کوژراوە. ئەو کەسانەی لەو کاتەدا لە نزیک نووسینگەکە بوون:", suspects: [ { name: "هاوبەشی خاوەنکار", alibi: "من لە دەرەوەی نووسینگەکە خەریکی قسەکردن بووم بە تەلەفۆن.", isKiller: false }, { name: "سکرتێر", alibi: "من لە ژووری سکرتاریەتەکەم بووم خەریکی نووسینی ڕاپۆرت بووم.", isKiller: true }, { name: "کارمەندی خاوێنکردنەوە", alibi: "من خەریکی پاککردنەوەی ژوورەکانی تەنیشت نووسینگەکە بووم.", isKiller: false } ], explanation: "سکرتێرەکە بکوژەکەیە! چونکە هیچ نیشانەیەک نییە کە خاوەنکارەکە ناڕەزایەتی پیشان دابێت بۆ بینینی. سکرتێر تەنها کەس بووە کە دەیتوانی بێ دەنگ بچێتە ناو ژووری خاوەنکارەکە." },
            { id: 4, title: "مەتەڵی گوندی دوور", story: "جوتیارێک لە کێڵگەکەی کوژراوە. تەنها سێ کەس لە کێڵگەکە بوون:", suspects: [ { name: "کوڕە گەورە", alibi: "من خەریکی ئاودانی زەوییەکە بووم لە ناوچەی ڕۆژئاوا.", isKiller: false }, { name: "هاوسەری جوتیارەکە", alibi: "من خەریکی چاککردنی خواردن بووم بۆ کۆتایی ڕۆژ.", isKiller: false }, { name: "کارمەندەکە", alibi: "من خەریکی چێشت لێنان بووم بۆ نانی نیوەڕۆ.", isKiller: true } ], explanation: "کارمەندەکە بکوژەکەیە! چونکە لە ڕۆژێکی گەرمدا، بێ ئەوەی کەس بزانێت کەی نانی نیوەڕۆ ئامادە دەبێت، هیچ کەسێک نەدەبوو بۆ چێشت لێنان، تەنها کەس کە پلانی ئەوەی هەبێت بۆ کوشتن لەو کاتەدا." },
            { id: 5, title: "تاوانی فرۆشگا", story: "خاوەن فرۆشگایەک کوژراوە. ئەم کەسانە لە نزیک فرۆشگاکە بوون:", suspects: [ { name: "کڕیار", alibi: "من تەنها خەریکی کڕین بووم و دواتر ڕۆیشتم.", isKiller: false }, { name: "پاسەوان", alibi: "من لە دەرەوەی فرۆشگاکە خەریکی چاودێری بووم.", isKiller: false }, { name: "کارمەندی فرۆشگا", alibi: "من لە ژووری کارمەندان خەریکی پشوو بووم.", isKiller: true } ], explanation: "کارمەندی فرۆشگایەکە بکوژەکەیە! چونکە ئەو بە ئاسانی دەیتوانی بچێتە ژووری خاوەن فرۆشگاکە، لە کاتی پشوودا." },
            { id: 6, title: "تاوانی مەیتەین", story: "مەیتەینێکی بەناوبانگ لە مەیتەینەکەی کوژراوە. ئەم کەسانە لەوێ بوون:", suspects: [ { name: "کارمەندی مەیتەین", alibi: "من خەریکی کار بووم لە مەیتەینەکە.", isKiller: false }, { name: "پاسەوانی مەیتەین", alibi: "من لە دەرەوەی مەیتەینەکە وەستابووم.", isKiller: true }, { name: "هاوسەری مەیتەین", alibi: "من لە ماڵ بووم.", isKiller: false } ], explanation: "پاسەوانەکە بکوژەکەیە! چونکە ئەو باشتر لە کەسانی تریش دەیتوانی بچێتە مەیتەینەکە و کاتی گونجاوی بۆ کوشتن هەبێت." },
            { id: 7, title: "تاوانی چێشتخانە", story: "چێشتلێنەرێک لە چێشتخانەکە کوژراوە. ئەم کەسانە لە نزیک چێشتخانەکە بوون:", suspects: [ { name: "یارمەتیدەر", alibi: "من خەریکی کار بووم لە چێشتخانەکە.", isKiller: false }, { name: "کارمەندی پاککردنەوە", alibi: "من خەریکی پاککردنەوەی چێشتخانەکە بووم.", isKiller: false }, { name: "چاککەرەوەی ئامێر", alibi: "من خەریکی چاککردنی ئامێرەکان بووم.", isKiller: true } ], explanation: "چاککەرەوەی ئامێرەکە بکوژەکەیە! چونکە ئەو بە ئاسانی دەیتوانی بچێتە چێشتخانەکە و کاتی گونجاوی هەبێت." },
            { id: 8, title: "تاوانی فڕۆکەخانە", story: "گەشتیارێک لە فڕۆکەخانە کوژراوە. ئەم کەسانە لە نزیک گەشتیارەکە بوون:", suspects: [ { name: "کارمەندی فڕۆکەخانە", alibi: "من خەریکی کار بووم لە فڕۆکەخانە.", isKiller: false }, { name: "پاسەوانی فڕۆکەخانە", alibi: "من لە دەرەوەی فڕۆکەخانە وەستابووم.", isKiller: true }, { name: "گەشتیار", alibi: "من لە خەودا بووم لە فڕۆکەخانە.", isKiller: false } ], explanation: "پاسەوانەکە بکوژەکەیە! چونکە ئەو دەیتوانی بێ دەنگ بچێتە لای گەشتیارەکە و بیکوژێت." },
            { id: 9, title: "تاوانی کۆتایی", story: "پۆلیسێک لە بنکەی پۆلیس کوژراوە. ئەم کەسانە لە نزیک بنکەی پۆلیس بوون:", suspects: [ { name: "پۆلیس", alibi: "من لە ناو بنکەی پۆلیس خەریکی کار بووم.", isKiller: true }, { name: "کارمەندی بنکەی پۆلیس", alibi: "من لە ناو بنکەی پۆلیس خەریکی پاککردنەوە بووم.", isKiller: false }, { name: "پاسەوانی بنکەی پۆلیس", alibi: "من لە دەرەوەی بنکەی پۆلیس وەستابووم.", isKiller: false } ], explanation: "پۆلیسەکە بکوژەکەیە! چونکە تەنها ئەو دەیتوانی بێ دەنگ بچێتە لای پۆلیسەکەی تر و بیکوژێت." },
            { id: 10, title: "تاوانی نهێنی", story: "پیاوێک لە نهێنییەکەی کوژراوە. ئەم کەسانە لە نهێنییەکە بوون:", suspects: [ { name: "کارمەندی نهێنی", alibi: "من خەریکی کار بووم لە نهێنییەکە.", isKiller: false }, { name: "پاسەوانی نهێنی", alibi: "من لە دەرەوەی نهێنییەکە وەستابووم.", isKiller: true }, { name: "هاوسەری پیاو", alibi: "من لە ماڵ بووم.", isKiller: false } ], explanation: "پاسەوانەکە بکوژەکەیە! چونکە ئەو دەیتوانی بێ دەنگ بچێتە لای پیاوەکە و بیکوژێت." }
        ];

        /* --- UI & FLOW CONTROL --- */

        function startTheInvestigation() {
            // Initiate dark music when the user clicks
            if(!audio.mainTheme) audio.initMainTheme(); 
            audio.playSimpleTone(330, 0.05); // Play entry tone

            const hero = document.getElementById('hero-screen');
            const game = document.getElementById('main-game');
            
            hero.classList.add('hidden'); // Slide hero away
            game.classList.add('visible'); // Show game SPA

            setTimeout(() => { hero.style.display = 'none'; loadCase(0); }, 800);
        }

        function loadCase(index) {
            if (index >= casesDatabase.length) { gameOver(); return; }
            
            activeCaseIndex = index;
            const currentCase = casesDatabase[index];
            
            // Update Stats UI
            document.getElementById('game-score').innerText = score;
            document.getElementById('game-case-count').innerText = `${currentCase.id} / ${casesDatabase.length}`;

            // Build Suspect Grid HTML dynamically
            let suspectsHTML = '';
            currentCase.suspects.forEach((s, idx) => {
                suspectsHTML += `
                    <div class="suspect-card fade" onclick="selectSuspect(${idx})">
                        <div class="suspect-select">DEDUCTION</div>
                        <div class="suspect-name">🔍 ${s.name}</div>
                        <div class="suspect-alibi">"${s.alibi}"</div>
                    </div>
                `;
            });

            // Inject content into main panel
            const panel = document.getElementById('panel-investigate');
            panel.innerHTML = `
                <h2 class="case-title">${currentCase.title}</h2>
                <p class="case-story">${currentCase.story}</p>
                <div class="suspect-grid">
                    ${suspectsHTML}
                </div>
            `;
            
            // Activate the investigation panel
            activatePanel('panel-investigate');
            panel.scrollTop = 0; // Scroll back to top if long text
        }

        function selectSuspect(idx) {
            if (isGameOver) return; // Prevent clicking after game ends
            
            const currentCase = casesDatabase[activeCaseIndex];
            const selectedSuspect = currentCase.suspects[idx];
            const overlay = document.getElementById('overlay-result');
            const titleElement = document.getElementById('res-title');
            const iconElement = document.getElementById('res-icon');
            const textElement = document.getElementById('res-text');
            const nextBtn = document.getElementById('res-next-btn');

            let isCorrect = selectedSuspect.isKiller;

            // Handle logic for win/lose
            if (isCorrect) {
                audio.playWin();
                score += 1000;
                titleElement.innerText = "نایاب بوو، لێکۆڵەر!";
                titleElement.style.color = "limegreen";
                iconElement.innerText = "✅";
                textElement.innerText = `ڕاستت دۆزیەوە. \n\nتەواوکردنی دۆسیەکە: ${currentCase.explanation}`;
            } else {
                audio.playLose();
                score = Math.max(0, score - 200); // Penalty but avoid negative score
                titleElement.innerText = "هەڵە بوویت لێکۆڵەر!";
                titleElement.style.color = "var(--blood-base)";
                iconElement.innerText = "❌";
                textElement.innerText = `ئەو کەسەی دەستت نیشان کرد بکوژەکە نەبوو، وە بکوژەکە توانی ڕابکات. \n\nلێکۆڵینەوەکە بەردەوامە.`;
            }

            // Update score tracker immediately
            document.getElementById('game-score').innerText = score;

            // Update Next Button logic
            if (activeCaseIndex < casesDatabase.length - 1) {
                nextBtn.innerText = "دۆسیەی داهاتوو";
                nextBtn.onclick = () => { overlay.classList.remove('visible'); loadCase(activeCaseIndex + 1); audio.playClick(); };
            } else {
                nextBtn.innerText = "بینینی ئەنجامی کۆتایی";
                nextBtn.onclick = () => { overlay.classList.remove('visible'); gameOver(); audio.playClick(); };
            }

            // Display Overlay
            overlay.classList.add('visible');
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('game-case-count').innerText = "تەواو بوو";
            document.getElementById('final-score-num').innerText = score;
            activatePanel('panel-final');
            audio.playWin(); // Final victory sound
        }

        function resetGame() {
            audio.playSimpleTone(440, 0.05); // Click sound
            score = 0;
            isGameOver = false;
            loadCase(0);
        }

        function activatePanel(panelId) {
            // Switch active panel for SPA feel
            document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }

    </script>
</body>
</html>
