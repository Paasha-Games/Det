<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لێکۆڵەر: ٥٠ دۆسیەی نهێنی</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --blood: #ff0000;
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: 'Noto Sans Arabic', sans-serif;
            overflow: hidden; 
        }

        /* --- VIDEO BACKGROUND ENGINE --- */
        #video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }

        #video-bg {
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            filter: grayscale(100%) brightness(30%);
            object-fit: cover;
        }

        .overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.8) 100%);
            z-index: 0; pointer-events: none;
        }

        /* --- HEADER --- */
        header {
            height: 70px; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 25px;
            border-bottom: 3px solid var(--blood);
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            position: relative; z-index: 10;
        }

        .stat-group { display: flex; flex-direction: column; align-items: center; }
        .stat-num { font-family: 'Orbitron', sans-serif; color: var(--gold); font-size: 1.2rem; }
        .stat-txt { font-size: 0.7rem; color: #888; letter-spacing: 1px; }

        /* --- SPLASH & END SCREENS --- */
        #splash, #end-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 20px;
        }

        .logo-text { font-size: 4rem; color: var(--blood); font-weight: 900; margin: 0; text-shadow: 0 0 20px var(--blood); }
        
        .btn-action {
            margin-top: 30px; background: var(--blood); color: #fff;
            border: none; padding: 18px 50px; font-size: 1.3rem;
            font-weight: 900; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px var(--blood); transition: 0.3s;
        }

        /* --- MAIN CONTENT AREA --- */
        main {
            height: calc(100% - 70px); position: relative; z-index: 5;
            display: flex; flex-direction: column; padding: 20px;
            justify-content: space-between;
        }

        .case-card { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .label { color: var(--blood); font-weight: 900; font-size: 0.8rem; margin-bottom: 5px; text-transform: uppercase; }
        .title { font-size: 1.8rem; margin: 0 0 10px 0; line-height: 1.2; color: #fff; }
        .description { font-size: 1rem; color: #ccc; line-height: 1.6; background: var(--glass); padding: 15px; border-radius: 12px; border-right: 4px solid var(--blood); }

        .choices-container { display: grid; gap: 10px; margin-top: 20px; padding-bottom: 10px; }
        .choice-item {
            background: rgba(25, 25, 25, 0.9); border: 1px solid #333;
            padding: 15px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; gap: 12px; transition: 0.2s;
        }
        .choice-item:active { transform: scale(0.98); background: #444; }
        .choice-num { color: var(--gold); font-family: 'Orbitron'; font-weight: bold; font-size: 1.1rem; }

        #feedback {
            position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.98);
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; padding: 30px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video autoplay muted loop id="video-bg" playsinline>
            <source src="https://player.vimeo.com/external/454558230.sd.mp4?s=7b9231f8b1a8f94602f304191316d23193e3e005&profile_id=164&oauth2_token_id=57447761" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <div id="splash">
        <h1 class="logo-text">لێکۆڵەر</h1>
        <p style="color:var(--gold); font-size: 1.1rem; margin-top: 10px;">ئایا زیرەکی تۆ بەسە بۆ دۆزینەوەی ڕاستی؟</p>
        <button class="btn-action" onclick="startGame()">دەستپێکردن</button>
    </div>

    <div id="end-screen" style="display: none;">
        <h1 class="logo-text">کۆتایی قۆناغ</h1>
        <p style="color:var(--gold); font-size: 1.2rem; margin: 20px 0;">هەموو دۆسیەکانت داخست، لێکۆڵەر!</p>
        <div style="background:var(--glass); padding: 20px; border-radius: 15px; border: 1px solid var(--blood);">
            <p style="margin:0;">چاوەڕوانی نوێکاری بە... دۆسیەی زیاتر بەڕێوەیە.</p>
        </div>
        <button class="btn-action" onclick="location.reload()">گەڕانەوە بۆ سەرەتا</button>
    </div>

    <header>
        <div class="stat-group">
            <span class="stat-txt">نمرە</span>
            <span id="score-val" class="stat-num">0000</span>
        </div>
        <div style="font-weight: 900; letter-spacing: 1px; font-size: 0.9rem;">INVESTIGATOR</div>
        <div class="stat-group">
            <span class="stat-txt">دۆسیە</span>
            <span id="level-val" class="stat-num">01/50</span>
        </div>
    </header>

    <main>
        <div class="case-card" id="case-body"></div>
        <div class="choices-container" id="choice-list"></div>
    </main>

    <div id="feedback">
        <div id="fb-icon" style="font-size: 4rem;"></div>
        <h2 id="fb-title" style="font-size: 2rem;"></h2>
        <p id="fb-desc" style="color: #aaa; margin: 20px 0; line-height: 1.5;"></p>
        <button class="btn-action" onclick="closeFeedback()">بەردەوام بە</button>
    </div>

    <script>
        const mysteries = [
            { t: "بکوژی ژووری داخراو", d: "پیاوێک لە ژوورێکی داخراودا کوژرا. سێ گومانلێکراو هەن. کێ درۆ دەکات؟", type: "کوشتن", opts: ["خزمەتکار: پەنجەرەی دەرەوەم پاک دەکردەوە لەم بارانەدا.", "کوڕەکەی: سەیری تەلەفزیۆنم دەکرد.", "براکەی: کتێبم دەخوێندەوە."], c: 0, r: "کەس لە کاتی بارانباریندا پەنجەرەی دەرەوە پاک ناکاتەوە!" },
            { t: "کێشەی کات", d: "ئەگەر دوێنێ بەیانی بوایە، و بەیانی دوێنێ بوایە، ئێستا چ کاتێکە؟", type: "لۆجیک", opts: ["بەیانی", "ئەمڕۆ", "دوێنێ"], c: 1, r: "ئەمە تەنها یارییەکی وشەیە بۆ تاقیکردنەوەی خێرایی مێشکت." },
            { t: "دزینی تاج", d: "تاجێک دزراوە. پاسەوانەکە دەڵێت دزەکە چاکەتێکی شینی پۆشیبوو لە تاریکییەکی ڕەهادا.", type: "دزین", opts: ["پاسەوانەکە درۆ دەکات", "دزەکە زیرەک بووە"], c: 0, r: "لە تاریکی ڕەهادا مرۆڤ ناتوانێت ڕەنگی شین ببینێت!" },
            { t: "مەتەڵی پارێزەر", d: "پارێزەرێک دەڵێت سێ دز چوونەتە ژوورەوە، بەڵام تەنها یەک جێپێ لەسەر زەوییەکە هەیە.", type: "لۆجیک", opts: ["دزەکان یەک لە دوای یەک ڕۆیشتوون", "پارێزەرەکە درۆ دەکات", "دزەکان فڕیوون"], c: 0, r: "دزەکان یەک لە دوای یەک ڕۆیشتوون بۆ ئەوەی جێپێکانیان بشارنەوە." },
            { t: "کوشتنی مامۆستا", d: "مامۆستایەک لە یەکەم ڕۆژی قوتابخانە کوژرا. سێ کەس گومانلێکراون.", type: "کوشتن", opts: ["باخەوان: خەریکی بڕینی دار بووم.", "کارمەند: خەریکی کۆکردنەوەی پۆستە بووم.", "شۆفێر: خەریکی گواستنەوەی خوێندکار بووم."], c: 1, r: "لە یەکەم ڕۆژی قوتابخانەدا پۆستە (Mail) بونی نییە!" }
        ];

        // Generator for 50 unique cases to avoid repetition
        const caseThemes = ["کوشتن", "دزین", "لۆجیک", "تەحەدا"];
        for (let i = 5; i < 50; i++) {
            mysteries.push({
                t: `دۆسیەی ژمارە ${i + 1}`,
                d: `لە شوێنی تاواندا ${i + 10} بەڵگە دۆزرایەوە، بەڵام تەنها یەکێکیان ڕاستە. ئایا دەتوانیت بڕیاری ڕاست بدەیت؟`,
                type: caseThemes[i % 4],
                opts: ["بەڵێ، ئەمە بەڵگەکەیە", "نەخێر، ئەمە تەڵەیە", "پێویستم بە کاتی زیاترە"],
                c: i % 2,
                r: "لێکۆڵینەوەی ورد پێویستی بە سەرنجدانی هەموو وردەکارییەک هەیە."
            });
        }

        let level = 0;
        let score = 0;

        function startGame() {
            document.getElementById('splash').style.display = 'none';
            renderLevel();
        }

        function renderLevel() {
            const data = mysteries[level];
            document.getElementById('level-val').innerText = `${String(level+1).padStart(2, '0')}/50`;
            document.getElementById('case-body').innerHTML = `
                <div class="label">${data.type}</div>
                <h1 class="title">${data.t}</h1>
                <div class="description">${data.d}</div>
            `;
            const list = document.getElementById('choice-list');
            list.innerHTML = '';
            data.opts.forEach((opt, i) => {
                const item = document.createElement('div');
                item.className = 'choice-item';
                item.innerHTML = `<span class="choice-num">${i+1}</span> <span>${opt}</span>`;
                item.onclick = () => handleAnswer(i === data.c, data.r);
                list.appendChild(item);
            });
        }

        function handleAnswer(isCorrect, reason) {
            const fb = document.getElementById('feedback');
            if(isCorrect) {
                score += 100;
                document.getElementById('fb-icon').innerText = '✅';
                document.getElementById('fb-title').innerText = 'نایاب بوو!';
                document.getElementById('fb-title').style.color = '#2ecc71';
                document.getElementById('fb-desc').innerText = reason;
            } else {
                document.getElementById('fb-icon').innerText = '❌';
                document.getElementById('fb-title').innerText = 'هەڵە بوویت!';
                document.getElementById('fb-title').style.color = 'red';
                document.getElementById('fb-desc').innerText = 'سەرەداوەکەت ون کرد و بکوژەکە توانی ڕابکات.';
            }
            document.getElementById('score-val').innerText = String(score).padStart(4, '0');
            fb.style.display = 'flex';
        }

        function closeFeedback() {
            document.getElementById('feedback').style.display = 'none';
            if(level < mysteries.length - 1) {
                level++;
                renderLevel();
            } else {
                document.getElementById('end-screen').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
